services:
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped
    networks: [metrics]

  promtail:
    image: grafana/promtail:3.1.1
    container_name: promtail
    environment:
      MONITORING_SERVER_IP: ${MONITORING_SERVER_IP:?set MONITORING_SERVER_IP in .env}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed "s|__MONITORING_SERVER_IP__|$${MONITORING_SERVER_IP}|g" \
          /etc/promtail/config.yml.template > /tmp/promtail-config.yml && \
        exec /usr/bin/promtail -config.file=/tmp/promtail-config.yml
    volumes:
      - ./promtail/config.yml.template:/etc/promtail/config.yml.template:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /etc/machine-id:/etc/machine-id:ro
    ports:
      - "9080:9080"
    restart: unless-stopped

  systemd-exporter:
    image: quay.io/prometheuscommunity/systemd-exporter:v0.7.0
    container_name: systemd-exporter
    user: "0:0"
    pid: host
    volumes:
      - /run/systemd:/run/systemd:ro
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket:ro
    command:
      - "--web.listen-address=0.0.0.0:9558"
    restart: unless-stopped
    networks: [metrics]

  metrics-proxy:
    image: nginx:1.27-alpine
    container_name: metrics-proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9443:9443"
    depends_on:
      - node-exporter
      - systemd-exporter
    restart: unless-stopped
    networks: [metrics]

networks:
  metrics:
    driver: bridge
