server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://MONITORING_SERVER_IP:3100/loki/api/v1/push

scrape_configs:
  - job_name: varlogs
    static_configs:
      - targets: [localhost]
        labels:
          job: varlogs
          host: HOSTNAME_PLACEHOLDER
          __path__: /var/log/**/*.log

  - job_name: docker
    static_configs:
      - targets: [localhost]
        labels:
          job: docker
          host: HOSTNAME_PLACEHOLDER
          __path__: /var/lib/docker/containers/*/*-json.log
